<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Signage</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65"
      crossorigin="anonymous"
    />
    <link href="css/template.css" rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
    />
    <script src="js/config.js"></script>
  </head>
  <body class="signage-page">
    <nav
      class="navbar navbar-expand-lg navbar-light bg-white dtpr-navbar sticky-top"
      id="dtpr-navbar"
    ></nav>

    <main class="signage-download-page">
      <section class="signage-download-hero">
        <div class="container">
          <div class="signage-download-inner">
            <div class="signage-download-copy">
              <p class="settings-label mb-2">Printable signage assets</p>
              <h1 class="signage-download-title">
                Edit the sticker design in Illustrator
              </h1>
              <p class="signage-download-text">
                Download the source artwork to update the signage layout, text,
                icons, and print-ready export outside the website.
              </p>
            </div>

            <div class="signage-download-actions">
              <a
                class="action-btn action-btn--save signage-download-btn"
                href="assets/source/DTPR Stickers.pdf"
                download
              >
                <i class="bi bi-vector-pen me-2"></i>Download Illustrator File
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer py-4 footer-txt" id="dtpr-footer"></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/scripts.js"></script>
    <script src="js/app.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        setPageTitle("Signage");
      });
    </script>
  </body>
</html>
