<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <meta name="description" content="DTPR digital transparency information for this sensing project."/>
  <title>DTPR Transparency</title>
  <link rel="icon" type="image/x-icon" href="assets/favicon.ico"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous"/>
  <link href="css/template.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap">
  <script src="js/config.js"></script>
</head>
<body class="dtpr-page">

<!-- ── Navbar ───────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg navbar-light bg-white dtpr-navbar sticky-top" id="dtpr-navbar"></nav>

<!-- ── DTPR Page Header ─────────────────────────────────── -->
<div class="dtpr-page-header">
  <div class="container">
    <div class="dtpr-header-inner">
      <div class="dtpr-header-icon">
        <i class="bi bi-shield-check-fill"></i>
      </div>
      <div>
        <h1 class="dtpr-header-title">Digital Transparency</h1>
        <p class="dtpr-header-sub">
          This page explains what technology is in use, how your data is collected, processed,
          stored, and who can access it — in plain language.
        </p>
      </div>
    </div>

    <!-- Section quick-nav pills -->
    <nav id="dtpr-section-nav" class="dtpr-section-nav" aria-label="Jump to section"></nav>
  </div>
</div>

<!-- ── DTPR Sections ─────────────────────────────────────── -->
<main class="dtpr-main">
  <div class="container">
    <div id="dtpr-cards">
      <!-- Injected by app.js from DTPR_CONFIG.dtprSections -->
    </div>
  </div>
</main>

<!-- ── Back to top ───────────────────────────────────────── -->
<button id="back-to-top" class="back-to-top" aria-label="Back to top">
  <i class="bi bi-chevron-up"></i>
</button>

<!-- ── Footer ───────────────────────────────────────────── -->
<footer class="site-footer py-4 footer-txt" id="dtpr-footer"></footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/scripts.js"></script>
<script src="js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  setPageTitle('DTPR Transparency');

  /* Back to top button */
  const btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', () => {
    btn.classList.toggle('visible', window.scrollY > 400);
  });
  btn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
});
</script>
</body>
</html>
